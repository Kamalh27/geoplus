name: GeoPlus CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify product version
        run: |
          node -e "const v=require('./package.json').version; const [a,b,c]=v.split('.').map(Number); if (!Number.isFinite(a)||!Number.isFinite(b)||!Number.isFinite(c)) { console.error('Invalid semver:', v); process.exit(1); } if (a < 1 || (a === 1 && b === 0 && c < 0)) { console.error('GeoPlus version must be >= 1.0.0. Found:', v); process.exit(1); } console.log('GeoPlus product version:', v);"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
